<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
 * { margin: 0; box-sizing: border-box; }
 body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #eee; }
 h1 { font-size: 2.5rem; margin-bottom: .5rem; background: linear-gradient(135deg, #e94560, #0f3460); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 #status { font-size: 1.3rem; margin-bottom: 1.5rem; min-height: 2rem; transition: opacity .3s; }
 #wrapper { display: flex; gap: 2.5rem; align-items: flex-start; }
 .board { display: grid; grid-template-columns: repeat(3, 110px); gap: 8px; }
 .cell { width: 110px; height: 110px; background: #16213e; border: 2px solid #0f3460; border-radius: 12px; font-size: 2.8rem; font-weight: 700; cursor: pointer; transition: transform .15s, background .2s; display: flex; align-items: center; justify-content: center; }
 .cell:hover:not(.taken) { background: #1a1a40; transform: scale(1.05); }
 .cell.taken { cursor: default; }
 .cell.X { color: #e94560; }
 .cell.O { color: #00d2ff; }
 .cell.win { animation: pop .5s ease; background: #0f3460; }
 @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
 @keyframes fadeIn { from { opacity: 0; transform: scale(.5); } to { opacity: 1; transform: scale(1); } }
 .cell.placed { animation: fadeIn .25s ease; }
 #setup { text-align: center; }
 #setup input { padding: .5rem .8rem; font-size: 1rem; border: 2px solid #0f3460; border-radius: 8px; background: #16213e; color: #eee; margin: .3rem; width: 180px; }
 #setup input::placeholder { color: #666; }
 .btn { margin-top: 1rem; padding: .7rem 2rem; font-size: 1.1rem; border: none; border-radius: 8px; background: linear-gradient(135deg, #e94560, #0f3460); color: #fff; cursor: pointer; transition: transform .2s, opacity .2s; }
 .btn:hover { transform: scale(1.05); opacity: .9; }
 .btn-sm { margin-top: .5rem; padding: .5rem 1.2rem; font-size: .9rem; }
 .hidden { display: none; }
 .symbol-pick { margin: .8rem 0; display: flex; justify-content: center; gap: .5rem; align-items: center; }
 .sym-btn { font-size: 1.1rem; padding: .5rem 1.2rem; border: 2px solid #0f3460; border-radius: 8px; background: #16213e; cursor: pointer; transition: all .2s; color: #eee; }
 .sym-btn:hover { background: #1a1a40; }
 .sym-btn.active { background: #0f3460; border-color: #e94560; }
 .sym-btn .sx { color: #e94560; font-weight: 700; }
 .sym-btn .so { color: #00d2ff; font-weight: 700; }
 .sidebar { display: flex; flex-direction: column; gap: 1rem; }
 .leaderboard { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 1.2rem 1.5rem; min-width: 200px; }
 .leaderboard h2 { font-size: 1.1rem; margin-bottom: 1rem; text-align: center; color: #e94560; }
 .lb-row { display: flex; justify-content: space-between; padding: .4rem 0; border-bottom: 1px solid #0f3460; font-size: .95rem; }
 .lb-row:last-child { border-bottom: none; }
 .lb-label { opacity: .7; }
 .lb-val { font-weight: 700; }
 .lb-val.X { color: #e94560; }
 .lb-val.O { color: #00d2ff; }
 .lb-val.draw { color: #aaa; }
 .lb-section { font-size: .85rem; opacity: .5; margin-top: .6rem; margin-bottom: .2rem; text-align: center; }
 .past-matchup { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: .6rem .8rem; font-size: .85rem; margin-top: .3rem; }
 .past-matchup .pm-names { font-weight: 600; margin-bottom: .3rem; }
 .past-matchup .pm-score { opacity: .8; }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="setup">
 <div><input id="name1" placeholder="Player 1 name" /></div>
 <div class="symbol-pick" id="symPick">
   <div>Player 1 plays as:</div>
   <button class="sym-btn active" data-sym="X"><span class="sx">✕</span></button>
   <button class="sym-btn" data-sym="O"><span class="so">○</span></button>
 </div>
 <div><input id="name2" placeholder="Player 2 name" /></div>
 <button class="btn" id="startBtn">Start Game</button>
</div>
<div id="game" class="hidden">
 <div id="status"></div>
 <div id="wrapper">
   <div class="board" id="board"></div>
   <div class="sidebar">
     <div class="leaderboard">
       <h2>🏆 Current Match</h2>
       <div class="lb-row"><span class="lb-label" id="lbNameX">X</span><span class="lb-val X" id="lbX">0</span></div>
       <div class="lb-row"><span class="lb-label" id="lbNameO">O</span><span class="lb-val O" id="lbO">0</span></div>
       <div class="lb-row"><span class="lb-label">Draws</span><span class="lb-val draw" id="lbD">0</span></div>
       <div class="lb-section">All-time between these two</div>
       <div class="lb-row"><span class="lb-label" id="lbANameX">X</span><span class="lb-val X" id="lbAX">0</span></div>
       <div class="lb-row"><span class="lb-label" id="lbANameO">O</span><span class="lb-val O" id="lbAO">0</span></div>
       <div class="lb-row"><span class="lb-label">Draws</span><span class="lb-val draw" id="lbAD">0</span></div>
     </div>
     <div id="pastMatchups"></div>
   </div>
 </div>
 <div>
   <button class="btn" id="reset">New Round</button>
   <button class="btn btn-sm" id="newMatch">Change Players</button>
 </div>
</div>
<script>
const board = document.getElementById('board'), status = document.getElementById('status');
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells, state, turn, over, players = {}, score = { X:0, O:0, D:0 };

function nm(t) { return `${players[t]} (${t})`; }
function matchKey(a, b) { return [a,b].sort().join(' vs ').toLowerCase(); }

function getAllScores() {
 return JSON.parse(localStorage.getItem('ttt-scores') || '{}');
}
function saveAllScores(data) {
 localStorage.setItem('ttt-scores', JSON.stringify(data));
}
function getMatchScore(n1, n2) {
 return getAllScores()[matchKey(n1, n2)] || { scores: {}, names: [n1, n2] };
}
function saveMatchScore(n1, n2, winner) {
 const all = getAllScores(), key = matchKey(n1, n2);
 if (!all[key]) all[key] = { scores: {}, names: [n1, n2] };
 all[key].scores[winner] = (all[key].scores[winner] || 0) + 1;
 saveAllScores(all);
}

function updateLB() {
 document.getElementById('lbX').textContent = score.X;
 document.getElementById('lbO').textContent = score.O;
 document.getElementById('lbD').textContent = score.D;
 const m = getMatchScore(players.X, players.O);
 document.getElementById('lbAX').textContent = m.scores[players.X] || 0;
 document.getElementById('lbAO').textContent = m.scores[players.O] || 0;
 document.getElementById('lbAD').textContent = m.scores['draw'] || 0;
 document.getElementById('lbANameX').textContent = players.X;
 document.getElementById('lbANameO').textContent = players.O;
 showPastMatchups();
}

function showPastMatchups() {
 const all = getAllScores(), cur = matchKey(players.X, players.O);
 const el = document.getElementById('pastMatchups');
 const others = Object.entries(all).filter(([k]) => k !== cur);
 if (!others.length) { el.innerHTML = ''; return; }
 el.innerHTML = '<div class="lb-section">Other matchups</div>' +
   others.slice(-5).reverse().map(([, v]) => {
     const n = v.names;
     const s = n.map(p => `${p}: ${v.scores[p]||0}`).join(', ') + `, Draws: ${v.scores['draw']||0}`;
     return `<div class="past-matchup"><div class="pm-names">${n[0]} vs ${n[1]}</div><div class="pm-score">${s}</div></div>`;
   }).join('');
}

let chosenSym = 'X';
document.getElementById('symPick').addEventListener('click', e => {
 const btn = e.target.closest('.sym-btn');
 if (!btn) return;
 chosenSym = btn.dataset.sym;
 document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
});

document.getElementById('startBtn').addEventListener('click', () => {
 const n1 = document.getElementById('name1').value.trim() || 'Player 1';
 const n2 = document.getElementById('name2').value.trim() || 'Player 2';
 players[chosenSym] = n1;
 players[chosenSym === 'X' ? 'O' : 'X'] = n2;
 document.getElementById('lbNameX').textContent = players.X;
 document.getElementById('lbNameO').textContent = players.O;
 document.getElementById('setup').classList.add('hidden');
 document.getElementById('game').classList.remove('hidden');
 score = { X:0, O:0, D:0 };
 updateLB();
 init();
});

document.getElementById('newMatch').addEventListener('click', () => {
 document.getElementById('game').classList.add('hidden');
 document.getElementById('setup').classList.remove('hidden');
});

function init() {
 board.innerHTML = '';
 state = Array(9).fill('');
 turn = 'X'; over = false;
 status.textContent = `${nm('X')}'s turn`;
 cells = Array.from({length: 9}, (_, i) => {
   const c = document.createElement('div');
   c.className = 'cell';
   c.addEventListener('click', () => play(i));
   board.appendChild(c);
   return c;
 });
}

function play(i) {
 if (over || state[i]) return;
 state[i] = turn;
 cells[i].textContent = turn;
 cells[i].classList.add('taken', 'placed', turn);
 const w = wins.find(l => l.every(j => state[j] === turn));
 if (w) {
   over = true;
   w.forEach(j => cells[j].classList.add('win'));
   status.textContent = `${nm(turn)} wins! 🎉`;
   score[turn]++;
   saveMatchScore(players.X, players.O, players[turn]);
   updateLB();
 } else if (state.every(Boolean)) {
   over = true;
   status.textContent = "It's a draw!";
   score.D++;
   saveMatchScore(players.X, players.O, 'draw');
   updateLB();
 } else {
   turn = turn === 'X' ? 'O' : 'X';
   status.textContent = `${nm(turn)}'s turn`;
 }
}

document.getElementById('reset').addEventListener('click', init);
</script>
</body>
</html>
